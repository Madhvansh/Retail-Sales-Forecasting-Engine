services:
  api:
    build: .
    image: retail-forecasting-engine:latest
    command: uvicorn app.api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./results:/app/results
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1

  dashboard:
    image: retail-forecasting-engine:latest
    depends_on:
      - api
    command: streamlit run app/dashboard.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "8501:8501"
    volumes:
      - ./results:/app/results
      - ./data:/app/data
