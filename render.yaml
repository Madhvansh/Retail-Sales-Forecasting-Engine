# Render.com Blueprint — one-click deploy of the API and dashboard.
# https://render.com/docs/blueprint-spec
#
# Deploy: click the "Deploy to Render" button in the README, or run
#   render blueprint launch
services:
  - type: web
    name: rfe-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: uvicorn app.api:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"

  - type: web
    name: rfe-dashboard
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: streamlit run app/dashboard.py --server.address 0.0.0.0 --server.port $PORT --server.headless true
    plan: free
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
